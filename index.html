<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardstock — Digital Business Card Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Cormorant+Garamond:wght@500;600;700&family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ui-bg:#EDEFF3;
    --ui-panel:#FFFFFF;
    --ui-border:#DBDEE5;
    --ui-ink:#1B1D22;
    --ui-sub:#6B7080;
    --ui-accent:#2F2E86;
    --ui-accent-soft:#EDECFB;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ui-bg);
    color:var(--ui-ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }

  /* ---------- App shell ---------- */
  .app{max-width:1280px;margin:0 auto;padding:28px 24px 60px;}
  .app-header{display:flex;align-items:center;gap:14px;margin-bottom:26px;}
  .brand-mark{
    width:44px;height:44px;border-radius:10px;
    background:linear-gradient(135deg,#2F2E86,#6B5CE0);
    color:#fff;display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;letter-spacing:.02em;
    flex-shrink:0;
  }
  .app-header h1{font-family:'Space Grotesk',sans-serif;font-size:22px;margin:0;font-weight:700;letter-spacing:-.01em;}
  .app-header p{margin:2px 0 0;color:var(--ui-sub);font-size:13.5px;}

  .app-body{display:grid;grid-template-columns:360px 1fr;gap:22px;align-items:start;}
  @media (max-width:900px){ .app-body{grid-template-columns:1fr;} }

  /* ---------- Panel / form ---------- */
  .panel{
    background:var(--ui-panel);border:1px solid var(--ui-border);border-radius:var(--radius);
    padding:22px;display:flex;flex-direction:column;gap:24px;
  }
  .field-group{display:flex;flex-direction:column;gap:10px;}
  .field-group h3{
    font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ui-sub);
    margin:0;font-weight:600;
  }
  .field-row{display:flex;flex-direction:column;gap:5px;}
  .field-row label{font-size:12.5px;color:var(--ui-sub);font-weight:500;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  input[type=text],input[type=email],input[type=tel],input[type=url],select{
    font-family:'Inter',sans-serif;font-size:14px;padding:9px 11px;
    border:1px solid var(--ui-border);border-radius:8px;background:#FBFBFD;color:var(--ui-ink);
    outline:none;width:100%;
  }
  input:focus,select:focus{border-color:var(--ui-accent);background:#fff;box-shadow:0 0 0 3px var(--ui-accent-soft);}
  input::placeholder{color:#A7ABB8;}

  /* photo uploader */
  .photo-row{display:flex;align-items:center;gap:14px;}
  .photo-drop{
    width:64px;height:64px;border-radius:50%;border:1.5px dashed var(--ui-border);
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
    color:var(--ui-sub);background:#FBFBFD;overflow:hidden;position:relative;
  }
  .photo-drop img{width:100%;height:100%;object-fit:cover;}
  .photo-drop:hover{border-color:var(--ui-accent);color:var(--ui-accent);}
  .photo-actions{display:flex;flex-direction:column;gap:6px;}
  .photo-actions span{font-size:12.5px;color:var(--ui-sub);}
  .link-btn{
    background:none;border:none;color:var(--ui-accent);font-size:12.5px;font-weight:600;
    cursor:pointer;padding:0;text-align:left;
  }

  /* socials */
  .social-row{display:grid;grid-template-columns:100px 1fr 30px;gap:8px;align-items:center;}
  .icon-btn{
    width:30px;height:30px;border-radius:7px;border:1px solid var(--ui-border);background:#FBFBFD;
    display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ui-sub);flex-shrink:0;
  }
  .icon-btn:hover{border-color:#D64545;color:#D64545;}
  .add-btn{
    display:flex;align-items:center;gap:6px;justify-content:center;
    padding:9px;border-radius:8px;border:1px dashed var(--ui-border);background:none;
    color:var(--ui-accent);font-size:13px;font-weight:600;cursor:pointer;
  }
  .add-btn:hover{background:var(--ui-accent-soft);}

  .toggle-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .toggle-row label{font-size:13px;color:var(--ui-ink);font-weight:500;}
  .toggle-row p{font-size:12px;color:var(--ui-sub);margin:2px 0 0;}
  .switch{position:relative;width:38px;height:22px;flex-shrink:0;}
  .switch input{opacity:0;width:0;height:0;}
  .slider{position:absolute;inset:0;background:#D6D9E0;border-radius:999px;cursor:pointer;transition:.15s;}
  .slider::before{content:"";position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s;}
  .switch input:checked + .slider{background:var(--ui-accent);}
  .switch input:checked + .slider::before{transform:translateX(16px);}

  .accent-row{display:flex;align-items:center;gap:10px;}
  input[type=color]{width:36px;height:36px;border:1px solid var(--ui-border);border-radius:8px;padding:2px;background:#fff;cursor:pointer;}

  /* ---------- Preview area ---------- */
  .preview-area{display:flex;flex-direction:column;gap:16px;position:sticky;top:24px;}
  .template-tabs{display:flex;flex-wrap:wrap;gap:8px;}
  .tpl-tab{
    display:flex;align-items:center;gap:8px;padding:7px 12px 7px 7px;border-radius:999px;
    border:1.5px solid var(--ui-border);background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:var(--ui-sub);
  }
  .tpl-tab.active{border-color:var(--ui-accent);color:var(--ui-ink);box-shadow:0 0 0 3px var(--ui-accent-soft);}
  .tpl-swatch{width:20px;height:20px;border-radius:50%;flex-shrink:0;}

  .stage-wrap{
    background:
      radial-gradient(circle at 1px 1px, #D3D6DE 1px, transparent 0) 0 0/16px 16px,
      var(--ui-panel);
    border:1px solid var(--ui-border);border-radius:var(--radius);
    display:flex;align-items:center;justify-content:center;padding:56px 20px;min-height:340px;
  }
  .card-stage{perspective:1200px;}
  .card{
    width:350px;height:200px;position:relative;overflow:hidden;
    box-shadow:0 18px 40px -14px rgba(20,20,30,.35), 0 2px 6px rgba(20,20,30,.08);
    transition:transform .25s ease;
  }
  .card-stage:hover .card{transform:rotate3d(1,-1,0,3deg);}

  .download-bar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .btn{
    display:inline-flex;align-items:center;gap:8px;padding:11px 18px;border-radius:8px;
    font-size:13.5px;font-weight:600;cursor:pointer;border:1px solid transparent;font-family:inherit;
  }
  .btn-primary{background:var(--ui-accent);color:#fff;}
  .btn-primary:hover{background:#252470;}
  .btn-ghost{background:#fff;border-color:var(--ui-border);color:var(--ui-ink);}
  .btn-ghost:hover{border-color:var(--ui-accent);color:var(--ui-accent);}
  .btn[disabled]{opacity:.6;cursor:default;}
  .hint{text-align:center;font-size:12px;color:var(--ui-sub);margin:0;}

  /* ===================================================================
     TEMPLATE: LINEN
  =================================================================== */
  .tpl-linen{
    background:#F6F2E9;color:#242018;border-radius:6px;
    font-family:'Inter',sans-serif;
    border:1px solid #E4DCC8;
  }
  .tpl-linen .linen-inner{position:absolute;inset:10px;border:1px solid #C9A66B55;padding:18px 20px;display:flex;flex-direction:column;justify-content:space-between;}
  .tpl-linen .linen-top{display:flex;align-items:center;gap:14px;}
  .tpl-linen .photo-slot{width:52px;height:52px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid #C9A66B;}
  .tpl-linen .initials-fallback{
    width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif;font-size:18px;color:#fff;flex-shrink:0;background:var(--accent,#8B6F47);
  }
  .tpl-linen h2{font-family:'Fraunces',serif;font-weight:600;font-size:20px;margin:0;letter-spacing:-.01em;}
  .tpl-linen .role{font-size:12px;color:#6B6350;margin:3px 0 0;letter-spacing:.02em;}
  .tpl-linen .rule{height:1px;background:#C9A66B66;margin:12px 0;}
  .tpl-linen .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;}
  .tpl-linen .contact-item{display:flex;flex-direction:column;gap:1px;}
  .tpl-linen .contact-item .cap{font-size:8.5px;text-transform:uppercase;letter-spacing:.1em;color:#9C927A;}
  .tpl-linen .contact-item .val{font-size:11.5px;color:#242018;font-weight:500;}
  .tpl-linen .socials{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
  .tpl-linen .badge{
    font-size:9.5px;font-weight:700;letter-spacing:.03em;color:#6B5636;
    border:1px solid #C9A66B;border-radius:3px;padding:2px 6px;
  }

  /* ===================================================================
     TEMPLATE: OBSIDIAN
  =================================================================== */
  .tpl-obsidian{
    background:radial-gradient(120% 140% at 50% -10%, #23231f 0%, #121212 60%);
    color:#EFE7D0;border-radius:6px;font-family:'Inter',sans-serif;
  }
  .tpl-obsidian .frame{position:absolute;inset:9px;border:1px solid #C9A22766;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:14px;}
  .tpl-obsidian .photo-slot{width:56px;height:56px;border-radius:50%;object-fit:cover;border:1.5px solid #C9A227;padding:2px;}
  .tpl-obsidian .initials-fallback{
    width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;font-weight:600;font-size:20px;color:#C9A227;
    border:1.5px solid #C9A227;
  }
  .tpl-obsidian h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:23px;letter-spacing:.06em;margin:10px 0 0;text-transform:uppercase;}
  .tpl-obsidian .role{font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;color:#C9A227;margin:4px 0 0;}
  .tpl-obsidian .diamond{width:6px;height:6px;background:#C9A227;transform:rotate(45deg);margin:9px auto;}
  .tpl-obsidian .contact-line{font-size:10.5px;color:#D9CFAF;margin:1.5px 0;letter-spacing:.02em;}
  .tpl-obsidian .socials{display:flex;gap:7px;margin-top:9px;}
  .tpl-obsidian .badge{
    width:20px;height:20px;border-radius:50%;border:1px solid #C9A227;color:#C9A227;
    font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;
  }

  /* ===================================================================
     TEMPLATE: KRAFT
  =================================================================== */
  .tpl-kraft{
    background:
      radial-gradient(circle at 15% 20%, rgba(255,255,255,.06), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(0,0,0,.05), transparent 40%),
      #C3A06E;
    color:#3B2E1D;border-radius:2px;font-family:'Space Mono',monospace;
  }
  .tpl-kraft .polaroid{
    position:absolute;left:16px;top:16px;width:58px;height:66px;background:#F7F2E6;padding:4px 4px 12px;
    box-shadow:0 4px 8px rgba(0,0,0,.25);transform:rotate(-4deg);
  }
  .tpl-kraft .polaroid img,.tpl-kraft .polaroid .initials-fallback{width:50px;height:44px;object-fit:cover;background:var(--accent,#8B5E34);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .tpl-kraft .tape{position:absolute;top:-6px;left:14px;width:30px;height:12px;background:rgba(255,255,255,.55);transform:rotate(-3deg);}
  .tpl-kraft .stamp{
    position:absolute;top:14px;right:14px;width:44px;height:44px;border-radius:50%;border:2px solid #3B2E1D66;
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transform:rotate(8deg);color:#3B2E1D88;
  }
  .tpl-kraft .info{position:absolute;left:84px;top:16px;right:14px;}
  .tpl-kraft h2{font-size:16px;margin:0;font-weight:700;letter-spacing:-.02em;}
  .tpl-kraft .role{font-size:9.5px;margin:3px 0 0;color:#5A4A32;text-transform:uppercase;letter-spacing:.06em;}
  .tpl-kraft .label-row{display:flex;gap:5px;font-size:9px;margin-top:6px;border-bottom:1px dashed #3B2E1D55;padding-bottom:2px;}
  .tpl-kraft .label-row .k{color:#5A4A32;flex-shrink:0;}
  .tpl-kraft .label-row .v{color:#3B2E1D;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tpl-kraft .socials{position:absolute;left:84px;bottom:14px;display:flex;gap:6px;}
  .tpl-kraft .badge{font-size:8.5px;font-weight:700;border:1px solid #3B2E1D66;padding:2px 5px;border-radius:2px;transform:rotate(-2deg);color:#3B2E1D;}

  /* ===================================================================
     TEMPLATE: BLUEPRINT
  =================================================================== */
  .tpl-blueprint{
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,.06) 0 1px, transparent 1px 20px),
      repeating-linear-gradient(90deg, rgba(255,255,255,.06) 0 1px, transparent 1px 20px),
      #0B2545;
    color:#DCEBFA;border-radius:2px;font-family:'JetBrains Mono',monospace;
  }
  .tpl-blueprint .cross{position:absolute;width:10px;height:10px;}
  .tpl-blueprint .cross::before,.tpl-blueprint .cross::after{content:"";position:absolute;background:#5DA9E9;}
  .tpl-blueprint .cross::before{width:10px;height:1px;top:4.5px;}
  .tpl-blueprint .cross::after{width:1px;height:10px;left:4.5px;}
  .tpl-blueprint .cross.tl{top:6px;left:6px;} .tpl-blueprint .cross.tr{top:6px;right:6px;}
  .tpl-blueprint .cross.bl{bottom:6px;left:6px;} .tpl-blueprint .cross.br{bottom:6px;right:6px;}
  .tpl-blueprint .content{position:absolute;inset:22px;display:flex;gap:14px;}
  .tpl-blueprint .photo-slot{width:54px;height:54px;object-fit:cover;border:1px solid #5DA9E9;flex-shrink:0;}
  .tpl-blueprint .initials-fallback{
    width:54px;height:54px;border:1px solid #5DA9E9;display:flex;align-items:center;justify-content:center;
    font-size:16px;color:#5DA9E9;flex-shrink:0;
  }
  .tpl-blueprint h2{font-size:15px;text-transform:uppercase;letter-spacing:.05em;margin:0;font-weight:700;}
  .tpl-blueprint .role{font-size:9px;color:#5DA9E9;text-transform:uppercase;letter-spacing:.08em;margin:4px 0 0;}
  .tpl-blueprint .dim-line{width:100%;height:1px;background:#5DA9E966;margin:8px 0 8px;position:relative;}
  .tpl-blueprint .dim-line::before,.tpl-blueprint .dim-line::after{content:"";position:absolute;top:-2.5px;width:1px;height:6px;background:#5DA9E966;}
  .tpl-blueprint .dim-line::before{left:0;} .tpl-blueprint .dim-line::after{right:0;}
  .tpl-blueprint .field{font-size:9px;color:#B8D3EC;margin:2px 0;}
  .tpl-blueprint .field b{color:#5DA9E9;font-weight:700;}
  .tpl-blueprint .socials{display:flex;gap:5px;margin-top:7px;}
  .tpl-blueprint .badge{font-size:8px;border:1px solid #5DA9E9;color:#5DA9E9;padding:1.5px 5px;}

  /* ===================================================================
     TEMPLATE: NEON
  =================================================================== */
  .tpl-neon{
    background:#0E0E14;color:#F1F0F8;border-radius:10px;font-family:'Space Grotesk',sans-serif;
  }
  .tpl-neon .blob{position:absolute;border-radius:50%;filter:blur(30px);opacity:.55;}
  .tpl-neon .blob1{width:140px;height:140px;background:#7C3AED;top:-50px;right:-40px;}
  .tpl-neon .blob2{width:120px;height:120px;background:#22D3EE;bottom:-50px;left:-30px;}
  .tpl-neon .content{position:absolute;inset:0;display:flex;align-items:center;gap:16px;padding:0 20px;}
  .tpl-neon .ring{padding:2.5px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#22D3EE);flex-shrink:0;}
  .tpl-neon .photo-slot{width:58px;height:58px;border-radius:50%;object-fit:cover;display:block;border:2.5px solid #0E0E14;}
  .tpl-neon .initials-fallback{
    width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:19px;font-weight:700;background:#0E0E14;border:2.5px solid #0E0E14;color:#F1F0F8;
  }
  .tpl-neon h2{
    font-size:19px;font-weight:700;margin:0;letter-spacing:-.01em;
    background:linear-gradient(90deg,#C4B5FD,#67E8F9);-webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .tpl-neon .role{font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:#A5ADCB;margin:4px 0 8px;}
  .tpl-neon .contact-line{font-size:10px;color:#D8DAF0;margin:2px 0;}
  .tpl-neon .socials{display:flex;gap:6px;margin-top:8px;}
  .tpl-neon .badge{
    font-size:8.5px;font-weight:700;padding:2.5px 7px;border-radius:999px;
    border:1px solid #6B5CE0;color:#C4B5FD;
  }


</style>
</head>
<body>
<div class="app">
  <header class="app-header">
    <div class="brand-mark">CS</div>
    <div>
      <h1>Cardstock</h1>
      <p>Design a digital business card, then export it as a print-ready image or PDF.</p>
    </div>
  </header>

  <div class="app-body">
    <!-- ============ FORM PANEL ============ -->
    <aside class="panel">

      <div class="field-group">
        <h3>Photo</h3>
        <div class="photo-row">
          <div class="photo-drop" id="photoDrop" title="Upload a photo">
            <svg id="photoIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h3l1.5-2h7L17 8h3a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z"/><circle cx="12" cy="13" r="3.5"/></svg>
          </div>
          <div class="photo-actions">
            <span>Square or portrait photos work best.</span>
            <button class="link-btn" id="removePhotoBtn" style="display:none;">Remove photo</button>
          </div>
          <input type="file" id="photoInput" accept="image/*" style="display:none;">
        </div>
      </div>

      <div class="field-group">
        <h3>About you</h3>
        <div class="field-row"><label for="nameInput">Full name</label><input type="text" id="nameInput" placeholder="Ava Moreno"></div>
        <div class="two-col">
          <div class="field-row"><label for="titleInput">Title</label><input type="text" id="titleInput" placeholder="Product Designer"></div>
          <div class="field-row"><label for="companyInput">Company</label><input type="text" id="companyInput" placeholder="Lumen Studio"></div>
        </div>
        <div class="field-row"><label for="locationInput">Location <span style="color:#A7ABB8;">(optional)</span></label><input type="text" id="locationInput" placeholder="San Francisco, CA"></div>
      </div>

      <div class="field-group">
        <h3>Contact</h3>
        <div class="field-row"><label for="emailInput">Email</label><input type="email" id="emailInput" placeholder="ava@lumenstudio.com"></div>
        <div class="two-col">
          <div class="field-row"><label for="phoneInput">Phone</label><input type="tel" id="phoneInput" placeholder="+1 415 555 0192"></div>
          <div class="field-row"><label for="websiteInput">Website</label><input type="url" id="websiteInput" placeholder="lumenstudio.com"></div>
        </div>
      </div>

      <div class="field-group">
        <h3>Social links</h3>
        <div id="socialsList"></div>
        <button class="add-btn" id="addSocialBtn" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          Add a link
        </button>
      </div>

      <div class="field-group">
        <h3>Extras</h3>

        <div class="accent-row">
          <input type="color" id="accentInput" value="#8B6F47">
          <span style="font-size:12.5px;color:var(--ui-sub);">Accent colour for the current template</span>
        </div>
      </div>

    </aside>

    <!-- ============ PREVIEW ============ -->
    <main class="preview-area">
      <div class="template-tabs" id="templateTabs"></div>
      <div class="stage-wrap">
        <div class="card-stage" id="cardStage"></div>
      </div>
      <div class="download-bar">
        <button class="btn btn-primary" id="downloadPngBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 19h16"/></svg>
          Download PNG
        </button>
        <button class="btn btn-ghost" id="downloadPdfBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 19h16"/></svg>
          Download PDF
        </button>
      </div>
      <p class="hint">Exports at print resolution — 3.5&nbsp;×&nbsp;2&nbsp;in, 300&nbsp;dpi.</p>
    </main>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
(function(){
  'use strict';

  /* ---------------- utilities ---------------- */
  function esc(str){
    return (str||'').replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function initials(name){
    var parts = (name||'').trim().split(/\s+/).filter(Boolean);
    if(!parts.length) return '?';
    if(parts.length===1) return parts[0][0].toUpperCase();
    return (parts[0][0]+parts[parts.length-1][0]).toUpperCase();
  }
  var ICONS = {
    envelope:'<path d="M3 5h18v14H3z" fill="none"/><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/>',
    phone:'<path d="M6.5 3h3l1.5 4-2 1.5a12 12 0 0 0 6.5 6.5l1.5-2 4 1.5v3a2 2 0 0 1-2.2 2A16 16 0 0 1 4.5 5.2 2 2 0 0 1 6.5 3z"/>',
    globe:'<circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/>',
    pin:'<path d="M12 21s7-6.2 7-11.5A7 7 0 0 0 5 9.5C5 14.8 12 21 12 21z"/><circle cx="12" cy="9.5" r="2.3"/>'
  };
  function icon(name, size){
    size = size||12;
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+ICONS[name]+'</svg>';
  }

  var SOCIAL_PLATFORMS = [
    {id:'linkedin', label:'LinkedIn', abbr:'in', prefix:'https://linkedin.com/in/'},
    {id:'twitter', label:'X / Twitter', abbr:'X', prefix:'https://x.com/'},
    {id:'instagram', label:'Instagram', abbr:'IG', prefix:'https://instagram.com/'},
    {id:'github', label:'GitHub', abbr:'GH', prefix:'https://github.com/'},
    {id:'facebook', label:'Facebook', abbr:'FB', prefix:'https://facebook.com/'},
    {id:'youtube', label:'YouTube', abbr:'YT', prefix:'https://youtube.com/@'},
    {id:'dribbble', label:'Dribbble', abbr:'DR', prefix:'https://dribbble.com/'},
    {id:'tiktok', label:'TikTok', abbr:'TT', prefix:'https://tiktok.com/@'},
    {id:'behance', label:'Behance', abbr:'BE', prefix:'https://behance.net/'},
    {id:'other', label:'Other', abbr:'@', prefix:''}
  ];
  function abbrFor(id){
    for(var i=0;i<SOCIAL_PLATFORMS.length;i++) if(SOCIAL_PLATFORMS[i].id===id) return SOCIAL_PLATFORMS[i].abbr;
    return '@';
  }
  function urlFor(id, value){
    if(value.match(/^https?:\/\//)) return value;
    var prefix = '';
    for(var i=0;i<SOCIAL_PLATFORMS.length;i++){
      if(SOCIAL_PLATFORMS[i].id===id) { prefix = SOCIAL_PLATFORMS[i].prefix; break; }
    }
    if(!prefix) return value.includes('.') ? 'https://'+value : value;
    var val = value.replace(/^@/, '');
    return prefix + val;
  }

  var TEMPLATES = [
    {id:'linen', name:'Linen', swatch:'linear-gradient(135deg,#F4F1E8,#C9A66B)', accent:'#8B6F47'},
    {id:'obsidian', name:'Obsidian', swatch:'linear-gradient(135deg,#141414,#C9A227)', accent:'#C9A227'},
    {id:'kraft', name:'Kraft', swatch:'linear-gradient(135deg,#C9A671,#8B6F47)', accent:'#8B5E34'},
    {id:'blueprint', name:'Blueprint', swatch:'linear-gradient(135deg,#0B2545,#5DA9E9)', accent:'#5DA9E9'},
    {id:'neon', name:'Neon', swatch:'linear-gradient(135deg,#7C3AED,#22D3EE)', accent:'#A855F7'}
  ];

  /* ---------------- state ---------------- */
  var state = {
    name:'Ava Moreno',
    title:'Product Designer',
    company:'Lumen Studio',
    location:'San Francisco, CA',
    email:'ava@lumenstudio.com',
    phone:'+1 415 555 0192',
    website:'lumenstudio.com',
    photo:null,
    socials:[
      {platform:'linkedin', value:'ava-moreno'},
      {platform:'instagram', value:'@avamoreno'}
    ],
    template:'linen',
    accents:{}
  };
  TEMPLATES.forEach(function(t){ state.accents[t.id]=t.accent; });

  /* ---------------- DOM refs ---------------- */
  var $ = function(id){ return document.getElementById(id); };
  var nameInput=$('nameInput'), titleInput=$('titleInput'), companyInput=$('companyInput'),
      locationInput=$('locationInput'), emailInput=$('emailInput'), phoneInput=$('phoneInput'),
      websiteInput=$('websiteInput'), photoInput=$('photoInput'), photoDrop=$('photoDrop'),
      removePhotoBtn=$('removePhotoBtn'), socialsList=$('socialsList'), addSocialBtn=$('addSocialBtn'),
      accentInput=$('accentInput'), templateTabs=$('templateTabs'),
      cardStage=$('cardStage'), downloadPngBtn=$('downloadPngBtn'), downloadPdfBtn=$('downloadPdfBtn');

  nameInput.value=state.name; titleInput.value=state.title; companyInput.value=state.company;
  locationInput.value=state.location; emailInput.value=state.email; phoneInput.value=state.phone;
  websiteInput.value=state.website;

  /* ---------------- photo upload ---------------- */
  photoDrop.addEventListener('click', function(){ photoInput.click(); });
  photoInput.addEventListener('change', function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      state.photo = ev.target.result;
      photoDrop.innerHTML = '<img src="'+state.photo+'" alt="">';
      removePhotoBtn.style.display = 'inline';
      renderCard();
    };
    reader.readAsDataURL(file);
  });
  removePhotoBtn.addEventListener('click', function(){
    state.photo = null;
    photoInput.value='';
    photoDrop.innerHTML = document.getElementById('photoIcon').outerHTML;
    removePhotoBtn.style.display='none';
    renderCard();
  });

  /* ---------------- text field binding ---------------- */
  function bindText(el, key){
    el.addEventListener('input', function(){ state[key]=el.value; renderCard(); });
  }
  bindText(nameInput,'name'); bindText(titleInput,'title'); bindText(companyInput,'company');
  bindText(locationInput,'location'); bindText(emailInput,'email'); bindText(phoneInput,'phone');
  bindText(websiteInput,'website');

  /* ---------------- socials ---------------- */
  function renderSocialsForm(){
    socialsList.innerHTML='';
    state.socials.forEach(function(s, idx){
      var row = document.createElement('div');
      row.className='social-row';
      var opts = SOCIAL_PLATFORMS.map(function(p){
        return '<option value="'+p.id+'"'+(p.id===s.platform?' selected':'')+'>'+p.label+'</option>';
      }).join('');
      row.innerHTML =
        '<select class="soc-platform">'+opts+'</select>'+
        '<input type="text" class="soc-value" placeholder="username or url" value="'+esc(s.value)+'">'+
        '<button class="icon-btn soc-remove" type="button" title="Remove">'+icon('pin',0)+'</button>';
      // replace remove icon with trash (kept ICONS small; draw trash inline)
      row.querySelector('.soc-remove').innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m-9 0l1 12a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-12"/></svg>';

      row.querySelector('.soc-platform').addEventListener('change', function(e){
        state.socials[idx].platform = e.target.value; renderCard();
      });
      row.querySelector('.soc-value').addEventListener('input', function(e){
        state.socials[idx].value = e.target.value; renderCard();
      });
      row.querySelector('.soc-remove').addEventListener('click', function(){
        state.socials.splice(idx,1); renderSocialsForm(); renderCard();
      });
      socialsList.appendChild(row);
    });
  }
  addSocialBtn.addEventListener('click', function(){
    if(state.socials.length>=6) return;
    state.socials.push({platform:'linkedin', value:''});
    renderSocialsForm(); renderCard();
  });

  /* ---------------- template tabs ---------------- */
  function renderTabs(){
    templateTabs.innerHTML='';
    TEMPLATES.forEach(function(t){
      var btn=document.createElement('button');
      btn.className='tpl-tab'+(t.id===state.template?' active':'');
      btn.type='button';
      btn.innerHTML='<span class="tpl-swatch" style="background:'+t.swatch+'"></span>'+t.name;
      btn.addEventListener('click', function(){
        state.template=t.id;
        accentInput.value=state.accents[t.id];
        renderTabs(); renderCard();
      });
      templateTabs.appendChild(btn);
    });
  }

  accentInput.addEventListener('input', function(){
    state.accents[state.template]=accentInput.value;
    renderCard();
  });


  /* ---------------- photo slot builder ---------------- */
  function photoSlot(){
    if(state.photo) return '<img class="photo-slot" src="'+state.photo+'" alt="">';
    return '<div class="photo-slot initials-fallback" style="--accent:'+state.accents[state.template]+'">'+esc(initials(state.name))+'</div>';
  }

  /* ---------------- template renderers ---------------- */
  function socialBadges(cls){
    return state.socials.filter(function(s){return s.value;}).map(function(s){
      return '<a href="'+esc(urlFor(s.platform, s.value))+'" target="_blank" class="'+cls+'" style="text-decoration:none;">'+esc(abbrFor(s.platform))+'</a>';
    }).join('');
  }

  function renderLinen(d){
    return ''+
    '<div class="linen-inner">'+
      '<div>'+
        '<div class="linen-top">'+photoSlot()+
          '<div><h2>'+esc(d.name||'Your Name')+'</h2><p class="role">'+esc(d.title||'')+(d.company?' &middot; '+esc(d.company):'')+'</p></div>'+
        '</div>'+
        '<div class="rule"></div>'+
        '<div class="contact-grid">'+
          (d.email?'<div class="contact-item"><span class="cap">Email</span><span class="val">'+esc(d.email)+'</span></div>':'')+
          (d.phone?'<div class="contact-item"><span class="cap">Phone</span><span class="val">'+esc(d.phone)+'</span></div>':'')+
          (d.website?'<div class="contact-item"><span class="cap">Web</span><span class="val">'+esc(d.website)+'</span></div>':'')+
          (d.location?'<div class="contact-item"><span class="cap">Based in</span><span class="val">'+esc(d.location)+'</span></div>':'')+
        '</div>'+
      '</div>'+
      (state.socials.some(function(s){return s.value;})?'<div class="socials">'+socialBadges('badge')+'</div>':'')+
    '</div>';
  }

  function renderObsidian(d){
    return ''+
    '<div class="frame">'+
      photoSlot()+
      '<h2>'+esc(d.name||'Your Name')+'</h2>'+
      '<p class="role">'+esc(d.title||'')+(d.company?' — '+esc(d.company):'')+'</p>'+
      '<div class="diamond"></div>'+
      (d.email?'<p class="contact-line">'+esc(d.email)+'</p>':'')+
      (d.phone||d.website?'<p class="contact-line">'+[d.phone,d.website].filter(Boolean).map(esc).join('   ·   ')+'</p>':'')+
      (state.socials.some(function(s){return s.value;})?'<div class="socials">'+socialBadges('badge')+'</div>':'')+
    '</div>'+
    (state.showQR?'<div class="qr-slot" id="qrSlot"></div>':'');
  }

  function renderKraft(d){
    return ''+
    '<div class="polaroid"><div class="tape"></div>'+
      (state.photo?'<img src="'+state.photo+'" alt="">':'<div class="initials-fallback" style="background:'+state.accents.kraft+'">'+esc(initials(d.name))+'</div>')+
    '</div>'+
    '<div class="stamp">'+esc(initials(d.name))+'</div>'+
    '<div class="info">'+
      '<h2>'+esc(d.name||'Your Name')+'</h2>'+
      '<p class="role">'+esc(d.title||'')+(d.company?' — '+esc(d.company):'')+'</p>'+
      (d.email?'<div class="label-row"><span class="k">EMAIL···</span><span class="v">'+esc(d.email)+'</span></div>':'')+
      (d.phone?'<div class="label-row"><span class="k">TEL·····</span><span class="v">'+esc(d.phone)+'</span></div>':'')+
      (d.website?'<div class="label-row"><span class="k">WEB·····</span><span class="v">'+esc(d.website)+'</span></div>':'')+
    '</div>'+
    (state.socials.some(function(s){return s.value;})?'<div class="socials">'+socialBadges('badge')+'</div>':'');
  }

  function renderBlueprint(d){
    return ''+
    '<div class="cross tl"></div><div class="cross tr"></div><div class="cross bl"></div><div class="cross br"></div>'+
    '<div class="content">'+
      photoSlot()+
      '<div style="flex:1;min-width:0;">'+
        '<h2>'+esc(d.name||'YOUR NAME')+'</h2>'+
        '<p class="role">'+esc(d.title||'')+(d.company?' / '+esc(d.company):'')+'</p>'+
        '<div class="dim-line"></div>'+
        (d.email?'<p class="field"><b>EMAIL </b>'+esc(d.email)+'</p>':'')+
        (d.phone?'<p class="field"><b>TEL </b>'+esc(d.phone)+'</p>':'')+
        (d.website?'<p class="field"><b>WEB </b>'+esc(d.website)+'</p>':'')+
        (state.socials.some(function(s){return s.value;})?'<div class="socials">'+socialBadges('badge')+'</div>':'')+
      '</div>'+
    '</div>'+
    (state.showQR?'<div class="qr-slot" id="qrSlot"></div>':'');
  }

  function renderNeon(d){
    return ''+
    '<div class="blob blob1"></div><div class="blob blob2"></div>'+
    '<div class="content">'+
      '<div class="ring">'+photoSlot()+'</div>'+
      '<div style="flex:1;min-width:0;">'+
        '<h2>'+esc(d.name||'Your Name')+'</h2>'+
        '<p class="role">'+esc(d.title||'')+(d.company?' · '+esc(d.company):'')+'</p>'+
        (d.email?'<p class="contact-line">'+esc(d.email)+'</p>':'')+
        (d.phone||d.website?'<p class="contact-line">'+[d.phone,d.website].filter(Boolean).map(esc).join('  ·  ')+'</p>':'')+
        (state.socials.some(function(s){return s.value;})?'<div class="socials">'+socialBadges('badge')+'</div>':'')+
      '</div>'+
    '</div>'+
    (state.showQR?'<div class="qr-slot" id="qrSlot"></div>':'');
  }

  var RENDERERS = {linen:renderLinen, obsidian:renderObsidian, kraft:renderKraft, blueprint:renderBlueprint, neon:renderNeon};

  function vCard(d){
    return 'BEGIN:VCARD\nVERSION:3.0\nN:'+d.name+'\nFN:'+d.name+'\nORG:'+(d.company||'')+'\nTITLE:'+(d.title||'')+'\nTEL:'+(d.phone||'')+'\nEMAIL:'+(d.email||'')+'\nURL:'+(d.website||'')+'\nEND:VCARD';
  }

  function renderCard(){
    var t = state.template;
    var card = document.createElement('div');
    card.className = 'card tpl-'+t;
    card.style.setProperty('--accent', state.accents[t]);
    card.innerHTML = RENDERERS[t](state);
    cardStage.innerHTML='';
    cardStage.appendChild(card);
  }

  /* ---------------- downloads ---------------- */
  function fileBase(){
    return (state.name||'business-card').trim().replace(/\s+/g,'-').toLowerCase() || 'business-card';
  }
  function captureCanvas(){
    var cardEl = cardStage.querySelector('.card');
    return (document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve()).then(function(){
      return html2canvas(cardEl, {scale:3, backgroundColor:null, useCORS:true});
    });
  }
  function withBusy(btn, label, fn){
    var original = btn.innerHTML;
    btn.disabled = true; btn.innerHTML = label;
    fn().finally(function(){ btn.disabled=false; btn.innerHTML=original; });
  }

  downloadPngBtn.addEventListener('click', function(){
    withBusy(downloadPngBtn, 'Rendering…', function(){
      return captureCanvas().then(function(canvas){
        var link=document.createElement('a');
        link.download = fileBase()+'-card.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    });
  });

  downloadPdfBtn.addEventListener('click', function(){
    withBusy(downloadPdfBtn, 'Rendering…', function(){
      return captureCanvas().then(function(canvas){
        var jsPDF = window.jspdf.jsPDF;
        var pdf = new jsPDF({orientation:'landscape', unit:'in', format:[3.5,2]});
        pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 3.5, 2);
        
        var cardEl = cardStage.querySelector('.card');
        var cardRect = cardEl.getBoundingClientRect();
        var links = cardEl.querySelectorAll('a[href]');
        links.forEach(function(link) {
          var rect = link.getBoundingClientRect();
          var x = ((rect.left - cardRect.left) / cardRect.width) * 3.5;
          var y = ((rect.top - cardRect.top) / cardRect.height) * 2;
          var w = (rect.width / cardRect.width) * 3.5;
          var h = (rect.height / cardRect.height) * 2;
          pdf.link(x, y, w, h, { url: link.href });
        });
        
        pdf.save(fileBase()+'-card.pdf');
      });
    });
  });

  /* ---------------- init ---------------- */
  accentInput.value = state.accents[state.template];
  renderSocialsForm();
  renderTabs();
  renderCard();
})();
</script>
</body>
</html>
